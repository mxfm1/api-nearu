/api/users:
  post:
    summary: Registrar usuario + crear perfil
    description: Crea un usuario via Better Auth y genera un perfil vacío asociado.
    tags: [Users]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [name, email, password]
            properties:
              name:
                type: string
                minLength: 2
                maxLength: 100
              email:
                type: string
                format: email
              password:
                type: string
                minLength: 8
    responses:
      '201':
        description: Usuario creado
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/UserResponse'
      '400':
        $ref: '../openapi.yaml#/components/responses/InputParseError'
      '409':
        $ref: '../openapi.yaml#/components/responses/Conflict'
      '500':
        $ref: '../openapi.yaml#/components/responses/InternalError'

/api/users/me:
  patch:
    summary: Actualizar usuario propio
    tags: [Users]
    security:
      - cookieAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
    responses:
      '200':
        description: Usuario actualizado
      '401':
        $ref: '../openapi.yaml#/components/responses/Unauthenticated'

/api/users/{id}:
  get:
    summary: Obtener usuario por ID
    tags: [Users]
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    responses:
      '200':
        description: Usuario encontrado
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/UserResponse'
      '404':
        $ref: '../openapi.yaml#/components/responses/NotFound'

  delete:
    summary: Eliminar usuario
    tags: [Users]
    security:
      - cookieAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    responses:
      '204':
        description: Usuario eliminado
      '401':
        $ref: '../openapi.yaml#/components/responses/Unauthenticated'
      '403':
        $ref: '../openapi.yaml#/components/responses/Unauthorized'

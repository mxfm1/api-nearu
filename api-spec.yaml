openapi: 3.0.3
info:
  title: NearU API
  version: 0.1.0
  description: API de NearU — plataforma de servicios y eventos

servers:
  - url: http://localhost:3000
    description: Desarrollo local
  - url: https://api-nearu-production.up.railway.app
    description: Producción (Railway)

paths:
  # ──────────────────────────────────────────────
  # AUTH
  # ──────────────────────────────────────────────
  /api/users:
    post:
      summary: Registrar usuario + crear perfil
      description: >
        Crea un usuario via Better Auth y automáticamente
        le genera un perfil (profiles) vacío asociado.
        Devuelve el usuario sin sesión (el frontend debe
        hacer sign-in aparte).
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 100
                  example: Juan Pérez
                email:
                  type: string
                  format: email
                  example: juan@ejemplo.com
                password:
                  type: string
                  minLength: 8
                  example: MiClaveSegura123
      responses:
        '201':
          description: Usuario creado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/InputParseError'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'

  # ──────────────────────────────────────────────
  # PROFILES
  # ──────────────────────────────────────────────
  /api/profiles/{userId}:
    get:
      summary: Obtener perfil por ID de usuario
      description: >
        Devuelve el perfil de empresa asociado al userId.
        Cada usuario tiene un solo perfil (relación 1:1).
      tags: [Profiles]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          example: iQk9nJj9oN4aA6WbHkYXdKUIweSAgP5q
      responses:
        '200':
          description: >
            Perfil encontrado. Incluye campos computados isComplete
            y missingFields para saber qué falta completar.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Profile'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/profiles/me:
    patch:
      summary: Actualizar perfil propio
      description: >
        Actualiza o crea el perfil del usuario autenticado.
        Requiere sesión activa (cookie).
      tags: [Profiles]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileUpdateInput'
      responses:
        '200':
          description: >
            Perfil actualizado. Devuelve el perfil completo
            con isComplete y missingFields para reflejar
            el estado actual de completitud.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Profile'
        '400':
          $ref: '#/components/responses/InputParseError'
        '401':
          $ref: '#/components/responses/Unauthenticated'

  # ──────────────────────────────────────────────
  # CATALOG (público)
  # ──────────────────────────────────────────────
  /api/categorias:
    get:
      summary: Listar categorías (servicios o eventos)
      description: >
        Devuelve las categorías disponibles. Opcionalmente
        filtra por type=service o type=event.
      tags: [Catálogo]
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [service, event]
          description: "Filtrar por tipo: service o event"
      responses:
        '200':
          description: Lista de categorías
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Categoria'

  /api/regiones:
    get:
      summary: Listar regiones con sus ubicaciones
      description: >
        Devuelve todas las regiones con sus ubicaciones
        anidadas. Chile completo con 16 regiones.
      tags: [Catálogo]
      responses:
        '200':
          description: Regiones con ubicaciones
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Region'

  /api/ubicaciones:
    get:
      summary: Listar ubicaciones planas
      description: >
        Devuelve todas las ubicaciones con su región
        asociada.
      tags: [Catálogo]
      responses:
        '200':
          description: Ubicaciones con región
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Ubicacion'

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: better-auth-session

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          example: 9a8b7c6d-5e4f-3a2b-1c0d-9e8f7a6b5c4d
        name:
          type: string
          example: Juan Pérez
        email:
          type: string
          format: email
          example: juan@ejemplo.com
        emailVerified:
          type: boolean
          example: false
        image:
          type: string
          nullable: true
          example: null
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Profile:
      type: object
      properties:
        id:
          type: string
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        userId:
          type: string
          example: 9a8b7c6d-5e4f-3a2b-1c0d-9e8f7a6b5c4d
        bannerUrl:
          type: string
          nullable: true
          format: uri
        logoUrl:
          type: string
          nullable: true
          format: uri
        name:
          type: string
          nullable: true
          example: Mi Empresa
        industry:
          type: string
          example: Tecnología
        description:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
          example: [software, desarrollo]
        location:
          type: string
          nullable: true
          example: Buenos Aires
        founded:
          type: string
          nullable: true
          example: "2020"
        employees:
          type: string
          nullable: true
          example: 1-10
        website:
          type: string
          nullable: true
          format: uri
        whatsapp:
          type: string
          nullable: true
          example: "+541112345678"
        socialLinks:
          type: array
          items:
            $ref: '#/components/schemas/SocialLink'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        isComplete:
          type: boolean
          description: "true si todos los campos requeridos están completos"
          example: false
        missingFields:
          type: array
          items:
            type: string
          description: "Campos faltantes (name, description, bannerUrl, industry, location, contactFields)"
          example: [name, bannerUrl, contactFields]

    SocialLink:
      type: object
      properties:
        id:
          type: string
        platform:
          type: string
          example: instagram
        url:
          type: string
          format: uri
        orden:
          type: integer
          example: 0

    Categoria:
      type: object
      properties:
        id:
          type: string
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        name:
          type: string
          example: Conferencias & Seminarios
        type:
          type: string
          enum: [service, event]
          example: event

    Region:
      type: object
      properties:
        id:
          type: string
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        name:
          type: string
          example: Metropolitana
        slug:
          type: string
          example: metropolitana
        locations:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
                example: Santiago Centro

    Ubicacion:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
          example: Las Condes
        region:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
              example: Metropolitana
            slug:
              type: string
              example: metropolitana

    ProfileUpdateInput:
      type: object
      properties:
        name:
          type: string
        industry:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        location:
          type: string
        founded:
          type: string
        employees:
          type: string
        website:
          type: string
        whatsapp:
          type: string
        bannerUrl:
          type: string
        logoUrl:
          type: string
        socialLinks:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: "Omitir para crear nuevo, incluir para actualizar existente"
              platform:
                type: string
              url:
                type: string
              orden:
                type: integer

    # ── Error Wrapper ──
    ApiError:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string

  responses:
    Unauthenticated:
      description: No autenticado — sesión requerida
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          example:
            success: false
            error:
              code: UNAUTHENTICATED
              message: Authentication required

    Unauthorized:
      description: Sin permisos
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          example:
            success: false
            error:
              code: UNAUTHORIZED
              message: Insufficient permissions

    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          example:
            success: false
            error:
              code: NOT_FOUND
              message: Profile not found

    Conflict:
      description: Conflicto — recurso duplicado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          example:
            success: false
            error:
              code: CONFLICT
              message: Email already in use

    InputParseError:
      description: Datos inválidos
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          example:
            success: false
            error:
              code: INPUT_PARSE_ERROR
              message: Invalid request data

    ProfileIncomplete:
      description: El perfil no tiene los campos requeridos completos
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              error:
                type: object
                properties:
                  code:
                    type: string
                    example: PROFILE_INCOMPLETE
                  message:
                    type: string
                    example: Completá tu perfil antes de publicar servicios
                  missingFields:
                    type: array
                    items:
                      type: string
                    example: [name, description, bannerUrl, location, contactFields]

    InternalError:
      description: Error inesperado del servidor
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          example:
            success: false
            error:
              code: INTERNAL_SERVER_ERROR
              message: An unexpected error occurred

# openspec/config.yaml
schema: spec-driven

context: |
  Tech stack: Express 4, TypeScript 6, Drizzle ORM 0.45, PostgreSQL, Node.js
  Architecture: Clean Architecture with DI (ioctopus) — domains with entities/use-cases/repositories/controllers/presenters/validators
  Testing: Playwright (E2E only), no unit/integration tests detected
  Auth: Better Auth with session cookies
  Email: Resend (configured for verify/reset only)
  Uploads: UploadThing (frontend generates URLs, backend stores them)
  Patterns: Repository pattern with interfaces, DI via @evyweb/ioctopus, Zod validation middleware

rules:
  proposal:
    - Include entity relationship diagram for new tables
    - Define scope boundaries clearly (what's IN and OUT of scope)
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
    - Include migration plan for existing data
  tasks:
    - Group by implementation batch
    - Keep tasks completable in one session
  apply:
    - Follow existing clean architecture patterns (entity → use-case → repository interface → repository → controller → DI → routes)
    - Always create migration files with drizzle-kit generate
  verify:
    build_command: "npx tsc --noEmit"
  archive:
    - Warn before merging destructive deltas

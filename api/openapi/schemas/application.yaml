ApplicationScoreBreakdown:
  type: object
  properties:
    ruleType:
      type: string
    pointsEarned:
      type: integer
    pointsPossible:
      type: integer
    percentage:
      type: integer
    reason:
      type: string
      nullable: true

ApplicationScore:
  type: object
  properties:
    totalScore:
      type: integer
    maxPossible:
      type: integer
    percentage:
      type: integer
      nullable: true
    computedAt:
      type: string
      format: date-time
    breakdown:
      type: array
      items:
        $ref: '#/components/schemas/ApplicationScoreBreakdown'

Application:
  type: object
  properties:
    id:
      type: string
    eventId:
      type: string
    applicantProfileId:
      type: string
    coverLetter:
      type: string
      nullable: true
    portfolioUrls:
      type: array
      items:
        type: string
        format: uri
    statusId:
      type: string
    status:
      type: string
    statusName:
      type: string
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
    event:
      type: object
      properties:
        title:
          type: string
        startAt:
          type: string
          format: date-time
          nullable: true
        statusSlug:
          type: string
          nullable: true
    applicantProfile:
      type: object
      properties:
        name:
          type: string
          nullable: true
        logoUrl:
          type: string
          nullable: true
    organizerProfileName:
      type: string
      nullable: true
    region:
      type: string
      nullable: true
    score:
      $ref: '#/components/schemas/ApplicationScore'

ApplicationResponse:
  type: object
  properties:
    success:
      type: boolean
    data:
      $ref: '#/components/schemas/Application'

ApplicationsResponse:
  type: object
  properties:
    success:
      type: boolean
    data:
      type: array
      items:
        $ref: '#/components/schemas/Application'

ScoringRule:
  type: object
  properties:
    id:
      type: string
    eventId:
      type: string
    ruleType:
      type: string
    weight:
      type: integer
    config:
      type: object
      nullable: true
    createdAt:
      type: string
      format: date-time

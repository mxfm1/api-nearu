ServiceContact:
  type: object
  properties:
    id:
      type: string
    type:
      type: string
    value:
      type: string
    readAt:
      type: string
      format: date-time
      nullable: true
    respondedAt:
      type: string
      format: date-time
      nullable: true

PortfolioItem:
  type: object
  properties:
    id:
      type: string
    url:
      type: string
      format: uri
    title:
      type: string
      nullable: true
    description:
      type: string
      nullable: true
    orden:
      type: integer

ServiceStatus:
  type: object
  properties:
    id:
      type: string
    name:
      type: string
    slug:
      type: string

Service:
  type: object
  properties:
    id:
      type: string
    profileId:
      type: string
    slug:
      type: string
    title:
      type: string
    marca:
      type: string
      nullable: true
    description:
      type: string
      nullable: true
    yearsExperience:
      type: integer
      nullable: true
    priceMin:
      type: integer
      nullable: true
    priceMax:
      type: integer
      nullable: true
    availability:
      type: string
      nullable: true
    contacts:
      type: array
      items:
        $ref: '#/components/schemas/ServiceContact'
    bannerUrl:
      type: string
      nullable: true
      format: uri
    logoUrl:
      type: string
      nullable: true
      format: uri
    thumbnailUrl:
      type: string
      nullable: true
      format: uri
    location:
      type: object
      nullable: true
      properties:
        id:
          type: string
        name:
          type: string
          nullable: true
    category:
      type: object
      nullable: true
      properties:
        id:
          type: string
        name:
          type: string
          nullable: true
    profile:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
          nullable: true
        slug:
          type: string
          nullable: true
    portfolio:
      type: array
      items:
        $ref: '#/components/schemas/PortfolioItem'
    status:
      $ref: '#/components/schemas/ServiceStatus'
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time

ServiceResponse:
  type: object
  properties:
    success:
      type: boolean
    data:
      $ref: '#/components/schemas/Service'

ServiciosResponse:
  type: object
  properties:
    success:
      type: boolean
    data:
      type: array
      items:
        $ref: '#/components/schemas/Service'

CreateServiceInput:
  type: object
  required: [title]
  properties:
    slug:
      type: string
      pattern: '^[a-z0-9-]+$'
    title:
      type: string
      minLength: 1
      maxLength: 200
    marca:
      type: string
      maxLength: 200
    description:
      type: string
      maxLength: 5000
    yearsExperience:
      type: integer
      minimum: 0
    priceMin:
      type: integer
      minimum: 0
    priceMax:
      type: integer
      minimum: 0
    availability:
      type: string
      maxLength: 500
    bannerUrl:
      type: string
      format: uri
    logoUrl:
      type: string
      format: uri
    thumbnailUrl:
      type: string
      format: uri
    locationId:
      type: string
    categoryId:
      type: string
    status:
      type: string
      enum: [draft, published, paused, archived]
      default: draft
    contacts:
      type: array
      items:
        type: object
        properties:
          type:
            type: string
          value:
            type: string
    portfolio:
      type: array
      items:
        type: object
        properties:
          url:
            type: string
            format: uri
          title:
            type: string
          description:
            type: string

UpdateServiceInput:
  type: object
  properties:
    slug:
      type: string
      pattern: '^[a-z0-9-]+$'
    title:
      type: string
      minLength: 1
      maxLength: 200
    marca:
      type: string
      maxLength: 200
    description:
      type: string
      maxLength: 5000
    yearsExperience:
      type: integer
      minimum: 0
    priceMin:
      type: integer
      minimum: 0
    priceMax:
      type: integer
      minimum: 0
    availability:
      type: string
      maxLength: 500
    bannerUrl:
      type: string
      format: uri
    logoUrl:
      type: string
      format: uri
    thumbnailUrl:
      type: string
      format: uri
    locationId:
      type: string
    categoryId:
      type: string
    status:
      type: string
      enum: [draft, published, paused, archived]
    contacts:
      type: array
      items:
        type: object
        properties:
          type:
            type: string
          value:
            type: string
    portfolio:
      type: array
      items:
        type: object
        properties:
          url:
            type: string
            format: uri
          title:
            type: string
          description:
            type: string
